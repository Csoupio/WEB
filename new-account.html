<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte</title>
    <link rel="stylesheet" href="ticket-template.css">
</head>
<body class="background">
    <a href="index.html">
        <img src="./assets/logo.png" class="Logo">
    </a>

    <div class="corp">
        <!-- action pointe vers register.php -->
        <form class="card" action="register.php" method="POST" id="accountCreate">
            <h2>Créer un compte</h2>

            <!-- Affichage des erreurs renvoyées par register.php -->
            <div id="server-errors" style="display:none; margin-bottom:12px;"></div>

            <input id="firstName" type="text" class="textzone" name="Prénom" placeholder="Prénom">
            <div id="firstName_error" class="error-text titanic">Veuillez renseigner votre prénom.</div>
            <br><br>

            <input id="lastName" type="text" class="textzone" name="Nom" placeholder="Nom">
            <div id="lastName_error" class="error-text titanic">Veuillez renseigner votre nom.</div>
            <br><br>

            <input id="email" type="email" class="textzone" name="email" placeholder="Email">
            <div id="email-creator_error" class="error-text titanic">Veuillez renseigner un email valide.</div>
            <br><br>

            <input id="password" type="password" class="textzone" name="password" placeholder="Mot de passe (min. 6 caractères)">
            <div id="password_error" class="error-text titanic">Veuillez renseigner un mot de passe valide (min. 6 caractères).</div>
            <br><br>

            <button id="submit-creator_create_password" type="submit" class="enter">Enregistrer</button>

            <p style="margin-top:12px; font-size:14px;">
                Déjà un compte ? <a href="login.html">Se connecter</a>
            </p>
        </form>
    </div>

    <script>
        // Afficher les erreurs renvoyées via URL par register.php
        const params = new URLSearchParams(window.location.search);
        if (params.has('errors')) {
            const errorsDiv = document.getElementById('server-errors');
            const msgs = params.get('errors').split('|');
            errorsDiv.style.display = 'block';
            errorsDiv.innerHTML = msgs.map(m =>
                `<div class="error-text" style="margin-bottom:4px;">⚠️ ${m}</div>`
            ).join('');
        }

        // Validation côté client avant envoi
        document.getElementById('accountCreate').addEventListener('submit', function(e) {
            let valid = true;

            const firstName = document.getElementById('firstName');
            const lastName  = document.getElementById('lastName');
            const email     = document.getElementById('email');
            const password  = document.getElementById('password');

            // Réinitialiser
            document.querySelectorAll('.error-text').forEach(el => el.classList.add('titanic'));

            if (!firstName.value.trim()) {
                document.getElementById('firstName_error').classList.remove('titanic');
                valid = false;
            }
            if (!lastName.value.trim()) {
                document.getElementById('lastName_error').classList.remove('titanic');
                valid = false;
            }
            if (!email.value.trim() || !email.value.includes('@')) {
                document.getElementById('email-creator_error').classList.remove('titanic');
                valid = false;
            }
            if (password.value.length < 6) {
                document.getElementById('password_error').classList.remove('titanic');
                valid = false;
            }

            if (!valid) e.preventDefault();
        });
    </script>
</body>
</html>
